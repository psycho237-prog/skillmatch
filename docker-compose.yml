version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skillmatch_db
    restart: always
    environment:
      POSTGRES_USER: skillmatch_user
      POSTGRES_PASSWORD: skillmatch_password
      POSTGRES_DB: skillmatch
    ports:
      - "3775:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/local_schema.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: skillmatch_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    container_name: skillmatch_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_USER=skillmatch_user
      - DB_PASSWORD=skillmatch_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=skillmatch
      - JWT_SECRET=your_super_secret_jwt_key_in_production
      - WHATSAPP_SESSION_PATH=./whatsapp-auth
      - PAWAPAY_API_KEY=eyJraWQiOiIxIiwiYWxnIjoiRVMyNTYifQ.eyJ0dCI6IkFBVCIsInN1YiI6IjIyNDUyIiwibWF2IjoiMSIsImV4cCI6MjA5NzEzNjU3NywiaWF0IjoxNzgxNTE3Mzc3LCJwbSI6IkRBRixQQUYiLCJqdGkiOiI0OTk2OGRmMS0wY2IzLTRhYmQtYWU3OS00ODNiODQ5ZDFiMGYifQ.eKitlpRdi_S02_OuSwDuYas1mCeysrGfn9Xv3yieNGRgfVK8kJL2l7Vq5KnWg0qn_fF43R1mrbpVRYAOgsOIMw
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/whatsapp-auth:/app/whatsapp-auth
      - ./backend/baileys_store:/app/baileys_store
    depends_on:
      - postgres

  otp-baileys-api:
    build: ./otp-baileys-api
    container_name: skillmatch_otp_api
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgres://skillmatch_user:skillmatch_password@postgres:5432/skillmatch
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_super_secret_jwt_key_in_production
      - BAILEYS_STORE_PATH=./baileys_store
      - SMS_PROVIDER=whatsapp
    volumes:
      - ./otp-baileys-api/baileys_store:/app/baileys_store
    depends_on:
      - postgres
      - redis

  admin-panel:
    build: 
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: skillmatch_admin
    restart: always
    ports:
      - "8080:8080" # Exposed to 8080
    environment:
      - VITE_API_URL=http://localhost:3001/api

volumes:
  pgdata:
  redisdata:
