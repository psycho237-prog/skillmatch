version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skillmatch_db
    restart: always
    environment:
      POSTGRES_USER: skillmatch_user
      POSTGRES_PASSWORD: skillmatch_password
      POSTGRES_DB: skillmatch
    ports:
      - "127.0.0.1:6001:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/local_schema.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: skillmatch_redis
    restart: always
    command: redis-server --port 6900
    ports:
      - "127.0.0.1:6900:6900"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    container_name: skillmatch_backend
    restart: always
    ports:
      - "3111:3001"
    environment:
      - HOST=0.0.0.0
      - PORT=3001
      - DB_USER=skillmatch_user
      - DB_PASSWORD=skillmatch_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=skillmatch
      - JWT_SECRET=your_super_secret_jwt_key_in_production
      - WHATSAPP_SESSION_PATH=./whatsapp-auth
      - PAWAPAY_API_KEY=eyJraWQiOiIxIiwiYWxnIjoiRVMyNTYifQ.eyJ0dCI6IkFBVCIsInN1YiI6IjIyNDUyIiwibWF2IjoiMSIsImV4cCI6MjA5NzEzNjU3NywiaWF0IjoxNzgxNTE3Mzc3LCJwbSI6IkRBRixQQUYiLCJqdGkiOiI0OTk2OGRmMS0wY2IzLTRhYmQtYWU3OS00ODNiODQ5ZDFiMGYifQ.eKitlpRdi_S02_OuSwDuYas1mCeysrGfn9Xv3yieNGRgfVK8kJL2l7Vq5KnWg0qn_fF43R1mrbpVRYAOgsOIMw
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/whatsapp-auth:/app/whatsapp-auth
      - ./backend/baileys_store:/app/baileys_store
    depends_on:
      - postgres


  admin-panel:
    build: 
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: skillmatch_admin
    restart: always
    ports:
      - "127.0.0.1:6002:8080" # Exposed securely only locally
    environment:
      - VITE_API_URL=http://localhost:3111/api

volumes:
  pgdata:
  redisdata:
