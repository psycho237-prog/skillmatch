version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skillmatch_db
    restart: always
    environment:
      POSTGRES_USER: skillmatch_user
      POSTGRES_PASSWORD: skillmatch_password
      POSTGRES_DB: skillmatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/local_schema.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: skillmatch_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_USER=skillmatch_user
      - DB_PASSWORD=skillmatch_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=skillmatch
      - JWT_SECRET=your_super_secret_jwt_key_in_production
      - WHATSAPP_SESSION_PATH=./whatsapp-auth
      - PAWAPAY_API_KEY=your_production_pawapay_key
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/whatsapp-auth:/app/whatsapp-auth
    depends_on:
      - postgres

  admin-panel:
    build: 
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: skillmatch_admin
    restart: always
    ports:
      - "8080:8080" # Secret port only you know/proxy
    environment:
      - VITE_API_URL=http://localhost:3001/api

volumes:
  pgdata:
